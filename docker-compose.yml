# version: "3.8"

x-airflow-common: &airflow_common
  build: .
  # image: apache/airflow:2.8.1-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "idxsectorrotation-secret"
    PYTHONPATH: /opt/airflow
    #_PIP_ADDITIONAL_REQUIREMENTS : "-r /opt/airflow/dags/requirements.txt"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./extract:/opt/airflow/extract
    - ./transform:/opt/airflow/transform
    - ./dbt_project:/opt/airflow/dbt_project
    - ./scripts:/opt/airflow/scripts
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # ====== PostgreSQL for Airflow metadata ======
  postgres-airflow:
    image: postgres:15
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - idxsectorrotation_net

  # ====== PostgresSQL for Data Warehouse ======
  postgres-warehouse:
    image: postgres:15
    container_name: postgres_warehouse
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: idx_warehouse
    volumes:
      - pg_warehouse_data:/var/lib/postgresql/data
      - ./scripts/init_warehouse.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 10s
      retries: 5
    networks:
      - idxsectorrotation_net

  # ============= MinIO: Data Lake =============
  minio:
    image: minio/minio:latest
    container_name: minio_idx
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
    networks:
      - idxsectorrotation_net

  # ============ MinIO bucket init ============
  minio-init:
    image: minio/minio:latest
    container_name: minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/idx-raw;
      mc mb --ignore-existing local/idx-processed;
      echo 'MinIO buckets created.';
      "
    networks:
      - idxsectorrotation_net

  # =========== Apache Spark Master ===========
  spark-master:
    image: bitnamilegacy/spark:latest
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - idxsectorrotation_net
    
  # =========== Apache Spark Worker ===========
  spark-worker:
    image: bitnamilegacy/spark:latest
    container_name: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    networks:
      - idxsectorrotation_net
    
  # ============== Airflow init ==============
  airflow-init:
    <<: *airflow_common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@idxsector.com
    networks:
      - idxsectorrotation_net
  
  # ============ Airflow Webserver ============
  airflow-webserver:
    <<: *airflow_common
    container_name: airflow_webserver_idx
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - idxsectorrotation_net
  
  # ============ Airflow Scheduler ============
  airflow-scheduler:
    <<: *airflow_common
    container_name: airflow_scheduler_idx
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - idxsectorrotation_net

  # ===== PostgreSQL for Metabase metadata ====
  postgres-metabase:
    image: postgres:15
    container_name: postgres_metabase
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
    volumes:
      - pg_metabase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "metabase"]
      interval: 10s
      retries: 5
    networks:
      - idxsectorrotation_net

  # =========== Metabase: Dashboard ===========
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: postgres-metabase
      JAVA_OPTS: -Xms512m -Xmx1g
    ports:
      - "3000:3000"
    depends_on:
      postgres-warehouse:
        condition: service_healthy
      postgres-metabase:
        condition: service_healthy
    networks:
      - idxsectorrotation_net
  

volumes:
  pg_airflow_data:
  pg_warehouse_data:
  pg_metabase_data:
  minio_data:
  airflow_logs:
  
networks:
  idxsectorrotation_net:
    driver: bridge