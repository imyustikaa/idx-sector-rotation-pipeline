version: 2

sources:
  - name: silver
    schema: silver
    description: "Spark output: metrics per ticker per day"
    tables:
      - name: ticker_metrics_daily
        description: "4 metrics: price momentum, sharpe ratio, rolling beta, max drawdown"
        columns:
        - name: ticker
        - name: trade_date
        - name: sector
        - name: week_label
        - name: price_momentum
        - name: sharpe_ratio
        - name: rolling_beta
        - name: max_drawdown
      
      - name: sector_daily_returns
        description: "Daily log returns per tickers for weekly return aggregation"
        columns:
          - name: ticker
          - name: trade_date
          - name: sector
          - name: week_label
          - name: daily_return
      
      - name: ihsg_benchmark
        description: "IHSG Benchmark data from Spark"
        columns:
          - name: trade_date
          - name: week_label